services:
  db:
    image: postgres:16-alpine
    container_name: farmacia_project_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farmacia_project_backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REPORTS_STT_MODEL: ${REPORTS_STT_MODEL:-small}
      REPORTS_STT_DEVICE: ${REPORTS_STT_DEVICE:-cpu}
      REPORTS_STT_COMPUTE_TYPE: ${REPORTS_STT_COMPUTE_TYPE:-int8}
      HF_HOME: /models-cache
      SAAS_ROOT_DOMAIN: ${SAAS_ROOT_DOMAIN:-localhost}
      SAAS_PUBLIC_BASE_URL: ${SAAS_PUBLIC_BASE_URL:-http://localhost:5173}
      SAAS_BILLING_SUCCESS_URL: ${SAAS_BILLING_SUCCESS_URL:-http://localhost:5173/admin/suscripcion?status=ok}
      SAAS_BILLING_CANCEL_URL: ${SAAS_BILLING_CANCEL_URL:-http://localhost:5173/admin/suscripcion?status=cancel}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${DJANGO_PORT}:8000"
    volumes:
      - ./backend/src:/app
      - ./backups:/app/backups
      - whisper_cache:/models-cache

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: farmacia_project_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:${DJANGO_PORT}
      VITE_ROOT_DOMAIN: ${SAAS_ROOT_DOMAIN:-localhost}
      VITE_STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${REACT_PORT}:5173"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules

  # --- NUEVOS SERVICIOS PARA BACKUP AUTOMÁTICO ---
  redis:
    image: redis:7-alpine
    container_name: farmacia_project_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - default
    ports:
      - "16379:6379"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farmacia_project_worker
    restart: unless-stopped
    command: celery -A config worker -l info
    env_file:
      - ./.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - RUN_MIGRATIONS=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/src:/app
      - ./backups:/app/backups
    networks:
      - default

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farmacia_project_beat
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - ./.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - RUN_MIGRATIONS=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/src:/app
      - ./backups:/app/backups
    networks:
      - default

volumes:
  postgres_data:
  redis_data:
  whisper_cache:
